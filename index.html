<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TotalGo | Signature Gold</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:#000;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-top:140px;
  padding-bottom:70px;
}

main{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
  margin-top:0; 
}

.header{
  background:#000;
  height:90px;
  border-bottom:2px solid #FFD700;
  text-align:center;
  padding:15px 20px 13px;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.header-inner{
  width:100%;
  max-width:700px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
}

.header-logo{height:34px}

.nav-links{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  font-size:12px;
  text-transform:uppercase;
  font-weight:600;
  align-items:center;
}
.nav-links a{color:#ccc;text-decoration:none}
  
#tg-cart-btn{
  position:absolute;
  top:50%;
  right:0;
  transform:translateY(-50%);
  background:none;
  border:none;
  cursor:pointer;
  color:#FFD700;
  font-size:28px;
}
#tg-cart-btn svg{width:28px;height:28px;display:block}
#tg-cart-badge{position:absolute;top:-5px;right:-8px;background:#FF3B30;color:#fff;font-size:12px;font-weight:bold;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}

.search-wrap{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  background:#000;
  padding:10px 20px;
  z-index:998;
  box-sizing:border-box;
  border-bottom:1px solid #222;
}
#searchInput{
  width:100%;
  max-width:700px;
  margin:0 auto;
  display:block;
  padding:12px 16px;
  border:1px solid #D4AF37;
  border-radius:12px;
  font-size:16px;
  outline:none;
  background:#111;
  color:#fff;
}
#searchInput:focus{
  border:2px solid #FFD700;
}
