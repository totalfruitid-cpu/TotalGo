<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TotalGo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#A8B5A2">
  <style>
    body{font-family:sans-serif;background:#E8EEE6;margin:0;color:#1A1A1A}
    header{background:#A8B5A2;padding:16px;text-align:center;font-weight:700;font-size:20px}
    .produk{background:#fff;margin:16px;padding:16px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .btn{background:#C9A961;border:none;padding:12px 20px;border-radius:12px;font-weight:700;width:100%;cursor:pointer}
    .cart{position:fixed;bottom:0;left:0;right:0;background:#1A1A1A;color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center}
  </style>
</head>
<body>
  <header>TotalGo</header>
  <div class="produk">
    <h3>Jus Alpukat Premium Gold</h3>
    <p>Sehatnya Sultan, Manisnya Pas</p>
    <p><b>Rp 28.000</b></p>
    <button class="btn" onclick="checkout('Jus Alpukat Premium Gold - Rp 28.000')">+ Keranjang</button>
  </div>
  <div class="cart">
    <span>TotalGo © 2026</span>
    <button class="btn" style="width:auto" onclick="checkoutAll()">Checkout WA</button>
  </div>
<script>
  let keranjang = [];
  function checkout(item){
    keranjang.push(item);
    alert(item + ' masuk keranjang!');
  }
  function checkoutAll(){
    if(keranjang.length === 0){alert('Keranjang masih kosong bro');return}
    let pesan = 'Halo TotalGo, gw mau order:%0A- ' + keranjang.join('%0A- ');
    window.open('https://wa.me/6285124441513?text=' + pesan, '_blank');
  }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
