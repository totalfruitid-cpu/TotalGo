<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TotalGo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#E8F0ED;min-height:100vh;display:flex;flex-direction:column}
.header{background:#C5D8D1;text-align:center;padding:15px 20px;position:relative;overflow:visible}
.header h1{font-size:22px;font-weight:600;color:#000}
#tg-cart-btn{position:absolute;top:12px;right:20px;background:none;border:none;cursor:pointer;z-index:10;color:#000}
#tg-cart-btn svg{width:28px;height:28px;display:block}
#tg-cart-badge{position:absolute;top:-5px;right:-8px;background:#FF3B30;color:#fff;font-size:12px;font-weight:bold;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.main-content{flex:1;padding:20px}
.produk{background:#fff;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.produk h2{font-size:20px;margin-bottom:8px}
.produk p{color:#555;margin-bottom:12px}
.harga{font-size:18px;font-weight:bold;margin-bottom:16px}
.btn-keranjang{width:100%;background:#C2A878;color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.tg-side-cart{position:fixed;top:0;right:-100%;width:85%;max-width:380px;height:100%;background:#fff;box-shadow:-4px 0 15px rgba(0,0,0,0.2);transition:right 0.3s ease;z-index:1001;display:flex;flex-direction:column}
.tg-side-cart.open{right:0}
.tg-side-cart-header{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.tg-side-cart-header h3{font-size:18px}
.tg-side-cart-close{background:none;border:none;font-size:24px;cursor:pointer}
.tg-cart-items{flex:1;overflow-y:auto;padding:16px}
.tg-cart-empty{text-align:center;color:#888;margin-top:40px}
.tg-side-cart-footer{padding:16px;border-top:1px solid #eee}
.tg-btn-checkout{width:100%;background:#25D366;color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.tg-cart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:none}
.tg-cart-overlay.open{display:block}
.tg-cart-item{display:flex;justify-content:space-between;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #f0f0f0}
.tg-cart-item-info{flex:1}
.tg-cart-item-name{font-weight:600;margin-bottom:4px}
.tg-cart-item-price{color:#555;font-size:14px}
.tg-cart-item-qty{display:flex;align-items:center;gap:8px}
.tg-cart-item-qty button{width:24px;height:24px;border:1px solid #ddd;background:#f9f9f9;border-radius:6px;cursor:pointer}
footer{background:#1A1A1A;color:#fff;text-align:center;padding:20px;font-size:14px;margin-top:auto}
footer a{color:#fff;text-decoration:none}
.fly-img {
  position: fixed;
  width: 50px;
  height: 50px;
  border-radius: 8px;
  z-index: 9999;
  pointer-events: none;
  object-fit: cover;
  transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
}
</style>
</head>
<body>
<div class="header">
<h1>TotalGo</h1>
<button id="tg-cart-btn" onclick="toggleCart()">🛒<span id="tg-cart-badge">0</span></button>
</div>
<div class="produk">
<img src="img/jus-alpukat.jpg" alt="Jus Alpukat Premium Gold">
  <h3>Jus Alpukat Premium Gold</h3>
  <p>Rp 25.000</p>
  <button onclick="addToCart('Jus Alpukat Premium Gold', 25000, event)">+ Keranjang</button>
</div>
</div>
<div id="tg-side-cart" class="tg-side-cart">
<div class="tg-side-cart-header">
<h3>Keranjang Lu</h3>
<button class="tg-side-cart-close" onclick="toggleCart()">×</button>
</div>
<div id="tg-cart-items" class="tg-cart-items"></div>
<div class="tg-side-cart-footer">
<div style="margin-bottom:12px;font-weight:600">Total: Rp <span id="tg-cart-total">0</span></div>
<button class="tg-btn-checkout" onclick="checkoutWA()">Checkout WA</button>
</div>
</div>
<div id="tg-cart-overlay" class="tg-cart-overlay" onclick="toggleCart()"></div>
<footer>
TotalGo © 2026 |
<a href="https://instagram.com/totalfruit.id" target="_blank">@totalfruit.id</a>
</footer>
<script>
let cart=JSON.parse(localStorage.getItem('tg_cart'))||[];
function updateCartUI(){
const badge=document.getElementById('tg-cart-badge');
const itemsDiv=document.getElementById('tg-cart-items');
const totalSpan=document.getElementById('tg-cart-total');
const totalQty=cart.reduce((sum,item)=>sum+item.qty,0);
badge.textContent=totalQty;
badge.style.display=totalQty>0?'flex':'none';
if(cart.length===0){
itemsDiv.innerHTML='<div class="tg-cart-empty">Keranjang masih kosong bro</div>';
}else{
itemsDiv.innerHTML=cart.map((item,i)=>`
<div class="tg-cart-item">
<div class="tg-cart-item-info">
<div class="tg-cart-item-name">${item.name}</div>
<div class="tg-cart-item-price">Rp ${item.price.toLocaleString('id-ID')}</div>
</div>
<div class="tg-cart-item-qty">
<button onclick="updateQty(${i},-1)">-</button>
<span>${item.qty}</span>
<button onclick="updateQty(${i},1)">+</button>
</div>
</div>
`).join('');
}
const total=cart.reduce((sum,item)=>sum+(item.price*item.qty),0);
totalSpan.textContent=total.toLocaleString('id-ID');
localStorage.setItem('tg_cart',JSON.stringify(cart));
}
function addToCart(name,price,event){
  const cartBtn = document.getElementById('tg-cart-btn');
  
  // EFEK TERBANG
  try {
    const img = event.target.closest('.produk')?.querySelector('img');
    if (img && cartBtn) {
      const flyImg = img.cloneNode();
      const imgRect = img.getBoundingClientRect();
      const cartRect = cartBtn.getBoundingClientRect();
      
      flyImg.className = 'fly-img';
      flyImg.style.top = imgRect.top + 'px';
      flyImg.style.left = imgRect.left + 'px';
      flyImg.style.width = imgRect.width + 'px';
      flyImg.style.height = imgRect.height + 'px';
      document.body.appendChild(flyImg);
      
      requestAnimationFrame(() => {
        flyImg.style.top = cartRect.top + 10 + 'px';
        flyImg.style.left = cartRect.left + 10 + 'px';
        flyImg.style.width = '20px';
        flyImg.style.height = '20px';
        flyImg.style.opacity = '0';
      });
      
      setTimeout(() => flyImg.remove(), 800);
    }
  } catch(e) {
    console.log('Animasi skip:', e);
  }
  
  // LOGIKA CART
  const found = cart.find(item => item.name === name);
  if(found){found.qty++;}
  else{cart.push({name,price,qty:1});}
  updateCartUI();
}
function updateQty(index,change){
cart[index].qty+=change;
if(cart[index].qty<=0)cart.splice(index,1);
updateCartUI();
}
function toggleCart(){
document.getElementById('tg-side-cart').classList.toggle('open');
document.getElementById('tg-cart-overlay').classList.toggle('open');
}
function checkoutWA(){
if(cart.length===0)return alert('Keranjang kosong bro');
let text=`Halo TotalGo, gw mau pesen:%0A`;
cart.forEach(item=>{
text+=`- ${item.name} x${item.qty} = Rp ${(item.price*item.qty).toLocaleString('id-ID')}%0A`;
});
const total=cart.reduce((sum,item)=>sum+(item.price*item.qty),0);
text+=`%0ATotal: Rp ${total.toLocaleString('id-ID')}`;
window.open(`https://wa.me/6285124441513?text=${text}`,'_blank');
}
updateCartUI();
</script>
</body>
</html>
