<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TotalGo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:sans-serif}
    .header{background:#d4a373;padding:12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    .header h1{font-size:20px;color:white}
    #tg-cart-btn{position:relative;background:none;border:none;font-size:24px}
    #tg-cart-badge{position:absolute;top:-5px;right:-8px;background:red;color:white;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;text-align:center}
    
    /* SIDE CART CSS */
    #tg-side-cart{position:fixed;top:0;right:-400px;width:360px;max-width:90vw;height:100vh;background:#fff;box-shadow:-2px 0 10px rgba(0,0,0,.2);z-index:1000;display:flex;flex-direction:column;transition:right .3s ease}
    #tg-side-cart.open{right:0}
    #tg-side-cart-header{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
    #tg-side-cart-header h3{font-size:18px}
    #tg-side-cart-close{background:none;border:none;font-size:28px;line-height:1;cursor:pointer}
    #tg-side-cart-body{flex:1;overflow-y:auto;padding:16px}
    #tg-side-cart-footer{padding:16px;border-top:1px solid #eee}
    #tg-checkout-btn{width:100%;padding:12px;background:#25D366;color:white;border:none;border-radius:8px;font-weight:bold;font-size:16px}
    .tg-cart-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.4);z-index:999;display:none}
    .tg-cart-overlay.show{display:block}
    
    .main-content{padding:16px}
    .produk{border:1px solid #ddd;padding:12px;margin-bottom:12px;border-radius:8px}
  </style>
</head>
<body>
  <div class="header">
    <h1>TotalGo</h1>
    <button id="tg-cart-btn" onclick="toggleCart()">
      🛒
      <span id="tg-cart-badge">0</span>
    </button>
  </div>

  <!-- SIDE CART TOTALGO FINAL V3 -->
  <div id="tg-side-cart">
    <div id="tg-side-cart-header">
      <h3>Keranjang Lu</h3>
      <button id="tg-side-cart-close" onclick="toggleCart()">×</button>
    </div>
    <div id="tg-side-cart-body">
      <div id="tg-side-cart-items"></div>
    </div>
    <div id="tg-side-cart-footer">
      <div style="margin-bottom:12px;font-weight:bold;font-size:16px;">
        Total: Rp <span id="tg-side-cart-total">0</span>
      </div>
      <button id="tg-checkout-btn" onclick="checkoutWA()">Checkout WA</button>
    </div>
</div>
  <div id="tg-cart-overlay" class="tg-cart-overlay" onclick="toggleCart()"></div>

  <div class="main-content">
    <div class="produk">
      <h3>Apel Fuji Test</h3>
      <p>Rp 25.000</p>
      <button onclick="addToCart('Apel Fuji Test', 25000)">+ Keranjang</button>
    </div>
    <div class="produk">
      <h3>Jeruk Test</h3>
      <p>Rp 20.000</p>
      <button onclick="addToCart('Jeruk Test', 20000)">+ Keranjang</button>
    </div>
  </div>

  <footer style="text-align:center;padding:20px;background:#f5f5f5;">
    TotalGo © 2026
  </footer>

  <script>
    let cart = JSON.parse(localStorage.getItem('tg_cart')) || [];
    
    function toggleCart(){
      document.getElementById('tg-side-cart').classList.toggle('open');
      document.getElementById('tg-cart-overlay').classList.toggle('show');
    }
    
    function updateCartUI(){
      const badge = document.getElementById('tg-cart-badge');
      const items = document.getElementById('tg-side-cart-items');
      const total = document.getElementById('tg-side-cart-total');
      let totalHarga = 0;
      let totalItem = 0;
      
      items.innerHTML = '';
      cart.forEach((item, i) => {
        totalHarga += item.price * item.qty;
        totalItem += item.qty;
        items.innerHTML += `<div style="margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:8px;">
          ${item.name} x${item.qty} - Rp ${item.price * item.qty}
        </div>`;
      });
      
      badge.innerText = totalItem;
      total.innerText = totalHarga.toLocaleString('id-ID');
      localStorage.setItem('tg_cart', JSON.stringify(cart));
    }
    
    function addToCart(name, price){
      const exist = cart.find(i => i.name === name);
      if(exist){
        exist.qty++;
      } else {
        cart.push({name: name, price: price, qty: 1});
      }
      updateCartUI();
      toggleCart();
    }
    
    function checkoutWA(){
      if(cart.length === 0){
        alert('Keranjang masih kosong bro');
        return;
      }
      let text = 'Halo TotalGo, gua mau order:%0A';
      cart.forEach(i => {
        text += `- ${i.name} x${i.qty} = Rp ${(i.price * i.qty).toLocaleString('id-ID')}%0A`;
      });
      let totalHarga = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
      text += `%0ATotal: Rp ${totalHarga.toLocaleString('id-ID')}`;
      window.open(`https://wa.me/6281234567890?text=${text}`, '_blank');
    }
    
    updateCartUI();
  </script>
</body>
</html>
